<div class="bg-white border border-outline-variant w-full max-w-md p-lg space-y-md rounded-none shadow-xl text-left">
    <div class="space-y-xs">
        <h3 class="font-headline-md text-headline-md text-primary font-bold">Finalize Diagnosis</h3>
        <p class="font-body-sm text-body-sm text-on-surface-variant">Select pregnancy status and gestational stage for the sheep.</p>
    </div>
    
    <div class="space-y-sm">
        <label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-tighter">Status & Gestational Stage</label>
        <div class="grid grid-cols-1 gap-sm">
            <!-- Inconclusive Option -->
            <label class="flex items-center gap-md p-md border border-outline-variant bg-white rounded-none cursor-pointer hover:bg-surface-container-low transition-colors group">
                <input type="radio" name="gestational-stage" value="Inconclusive" class="text-primary focus:ring-0">
                <div class="flex-grow">
                    <span class="font-label-bold text-label-bold text-on-surface-variant uppercase">Inconclusive</span>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Scan was incomplete or no anatomical features were detected.</p>
                </div>
            </label>

            <!-- Non-Pregnant Option -->
            <label class="flex items-center gap-md p-md border border-outline-variant bg-white rounded-none cursor-pointer hover:bg-surface-container-low transition-colors group">
                <input type="radio" name="gestational-stage" value="Non-Pregnant" checked class="text-primary focus:ring-0">
                <div class="flex-grow">
                    <span class="font-label-bold text-label-bold text-error uppercase">Non-Pregnant</span>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">No gestational indicators detected after confirming correct region.</p>
                </div>
            </label>
            
            <!-- Pregnant - Early Option -->
            <label class="flex items-center gap-md p-md border border-outline-variant bg-white rounded-none cursor-pointer hover:bg-surface-container-low transition-colors group">
                <input type="radio" name="gestational-stage" value="Pregnant (Early)" class="text-primary focus:ring-0">
                <div class="flex-grow">
                    <span class="font-label-bold text-label-bold text-on-tertiary-container uppercase">Pregnant (Early Stage)</span>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Gestational sac or early embryo detection.</p>
                </div>
            </label>

            <!-- Pregnant - Mid Option -->
            <label class="flex items-center gap-md p-md border border-outline-variant bg-white rounded-none cursor-pointer hover:bg-surface-container-low transition-colors group">
                <input type="radio" name="gestational-stage" value="Pregnant (Mid)" class="text-primary focus:ring-0">
                <div class="flex-grow">
                    <span class="font-label-bold text-label-bold text-on-tertiary-container uppercase">Pregnant (Mid Stage)</span>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Clear fetal structures and placentomes.</p>
                </div>
            </label>

            <!-- Pregnant - Late Option -->
            <label class="flex items-center gap-md p-md border border-outline-variant bg-white rounded-none cursor-pointer hover:bg-surface-container-low transition-colors group">
                <input type="radio" name="gestational-stage" value="Pregnant (Late)" class="text-primary focus:ring-0">
                <div class="flex-grow">
                    <span class="font-label-bold text-label-bold text-on-tertiary-container uppercase">Pregnant (Late Stage)</span>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Advanced pregnancy showing bone ossification.</p>
                </div>
            </label>
        </div>
    </div>
    
    <div class="flex gap-md pt-sm justify-end">
        <button id="cancel-diagnosis-btn" class="px-md py-sm bg-surface border border-outline-variant font-label-bold text-label-bold rounded-none hover:bg-surface-container-low transition-all">Cancel</button>
        <button id="save-diagnosis-btn" class="px-lg py-sm bg-primary text-on-primary font-label-bold text-label-bold rounded-none hover:opacity-90 transition-all flex items-center gap-sm">
            <span class="material-symbols-outlined text-[18px]">check_circle</span>
            Save Result
        </button>
    </div>
</div>
